<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gonnet Admin</title>

  <link rel="stylesheet" href="/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="padding:30px;">

<!-- ================= LOGIN ================= -->
<div id="loginBox" style="max-width:300px;margin:auto;margin-top:100px;">
  <h4>Admin Login</h4>
  <input type="password" id="adminPass" class="form-control mt-2" placeholder="Enter Password">
  <button class="btn btn-dark mt-2 w-100" onclick="loginAdmin()">Login</button>
</div>

<!-- ================= ADMIN PANEL ================= -->
<div id="adminPanel" style="display:none;">

  <h2>📊 Gonnet Orders Dashboard</h2>

  <!-- FILTER -->
  <div class="row mt-4">
    <div class="col-md-3">
      <input type="date" id="startDate" class="form-control">
    </div>

    <div class="col-md-3">
      <input type="date" id="endDate" class="form-control">
    </div>

    <div class="col-md-3">
      <button class="btn btn-warning" onclick="fetchOrders()">Filter</button>
    </div>

    <div class="col-md-3">
      <button class="btn btn-dark" onclick="printPage()">Print</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="mt-4">
    <h5>Total Orders: <span id="totalOrders">0</span></h5>
    <h5>Total Revenue: ₹<span id="totalRevenue">0</span></h5>
  </div>

  <!-- TABLE -->
  <table class="table table-bordered mt-4">
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Qty</th>
        <th>Total</th>
        <th>Address</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="ordersTable"></tbody>
  </table>

  <!-- DEFAULT BULK -->
  <div class="mt-4 p-4 border rounded bg-white">
    <h4>⚙️ Default Bulk Sticker</h4>
    <div class="row mt-3">
      <div class="col-md-3">
        <input type="number" id="defaultCount" class="form-control" value="10">
      </div>
      <div class="col-md-3">
        <button class="btn btn-primary w-100" onclick="generateDefaultBulk(this)">
          Generate Default PDF
        </button>
      </div>
    </div>
  </div>

  <!-- CUSTOM BULK -->
  <div class="mt-5 p-4 border rounded bg-light">
    <h4>🎯 Custom Bulk Sticker</h4>

    <div class="row mt-3">
      <div class="col-md-3">
        <input type="text" id="heading" class="form-control" placeholder="Heading">
      </div>

      <div class="col-md-3">
        <input type="text" id="rightsLine" class="form-control" placeholder="Rights Line">
      </div>

      <div class="col-md-3">
        <input type="text" id="poweredBy" class="form-control" placeholder="Powered By">
      </div>

      <div class="col-md-3">
        <input type="text" id="subheading" class="form-control" placeholder="Subheading">
      </div>
    </div>

    <div class="row mt-3">
      <div class="col-md-3">
        <input type="number" id="bulkCount" class="form-control" value="10">
      </div>

      <div class="col-md-3">
        <input type="text" id="note" class="form-control" placeholder="Footer">
      </div>

      <div class="col-md-3">
        <input type="file" id="logo" class="form-control" accept="image/*">
        <small style="font-size:10px;color:gray;">Max 200x200px</small>
      </div>

      <div class="col-md-3">
        <button class="btn btn-success w-100" onclick="generateCustomBulk(this)">
          Generate PDF
        </button>
      </div>
    </div>
  </div>

</div>

<script>

// ================= LOGIN =================
function loginAdmin() {
  const pass = document.getElementById("adminPass").value;

  if (pass === "gonnet_admin_123") {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    localStorage.setItem("adminAuth", "true");
  } else {
    alert("Wrong password");
  }
}

// ================= LOAD =================
window.onload = () => {

  if (localStorage.getItem("adminAuth") === "true") {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
  }

  const today = new Date().toISOString().split("T")[0];
  document.getElementById("startDate").value = today;
  document.getElementById("endDate").value = today;

  fetchOrders();
};

// ================= ORDERS =================
async function fetchOrders(){
  const startDate = document.getElementById("startDate").value;
  const endDate = document.getElementById("endDate").value;

  const res = await fetch("/api/admin/orders", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ startDate, endDate })
  });

  const data = await res.json();
  const orders = data.orders;

  let html = "";
  let totalRevenue = 0;

  orders.forEach(o => {
    totalRevenue += o.total;
    html += `
      <tr>
        <td>${o.name}</td>
        <td>${o.email}</td>
        <td>${o.quantity}</td>
        <td>₹${o.total}</td>
        <td>${o.address}, ${o.city}</td>
        <td>${new Date(o.createdAt).toLocaleString()}</td>
      </tr>
    `;
  });

  document.getElementById("ordersTable").innerHTML = html;
  document.getElementById("totalOrders").innerText = orders.length;
  document.getElementById("totalRevenue").innerText = totalRevenue;
}

// ================= DEFAULT =================
function generateDefaultBulk(btn){
  btn.innerText = "Generating...";
  btn.disabled = true;

  const count = document.getElementById("defaultCount").value || 10;
  const url = `/internal/bulk-qr?key=parth_bulk_2026&count=${count}`;

  window.open(url, "_blank");

  setTimeout(() => {
    btn.innerText = "Generate Default PDF";
    btn.disabled = false;
  }, 3000);
}

// ================= CUSTOM =================
async function generateCustomBulk(btn){

  btn.innerText = "Generating...";
  btn.disabled = true;

  const formData = new FormData();

  const rightsLine = document.getElementById("rightsLine").value || "";
  formData.append("rightsLine", rightsLine);

  formData.append("heading", document.getElementById("heading").value || "GONNET");
  formData.append("subheading", document.getElementById("subheading").value || "");
  formData.append("note", document.getElementById("note").value || "");
  formData.append("poweredBy", document.getElementById("poweredBy").value || "");
  formData.append("count", document.getElementById("bulkCount").value || 10);

  const logoFile = document.getElementById("logo").files[0];
  if (logoFile) formData.append("logo", logoFile);

  const res = await fetch(`/internal/custom-bulk?key=parth_bulk_2026`, {
    method: "POST",
    body: formData
  });

  const blob = await res.blob();
  const url = window.URL.createObjectURL(blob);
  window.open(url);

  btn.innerText = "Generate PDF";
  btn.disabled = false;
}

</script>

</body>
</html>
