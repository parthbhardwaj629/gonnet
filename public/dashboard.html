<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard - Gonnet</title>

  <link rel="stylesheet" href="/style.css">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">

  <a class="navbar-brand gradient-text" href="/">Gonnet</a>

  <div class="text-white">

    <span id="userEmail"></span>

    <button onclick="logout()" class="btn btn-sm btn-outline-light ms-3">
      Logout
    </button>

    <button
  onclick="deleteAccount()"
  class="btn btn-sm btn-outline-danger ms-2">
  Delete Account
</button>

  </div>

</nav>


 <div class="container-fluid px-3 px-md-4 mt-4 mt-md-5"></div>

  <h2 class="mb-3 fw-bold">Welcome back 👋</h2>

  <div class="row g-3" id="vehicleContainer"></div>

</div>


<script>

async function loadDashboard(){

  const email = localStorage.getItem("gonnetUserEmail");

  if(!email){
    window.location.href="/";
    return;
  }

  document.getElementById("userEmail").innerText=email;

  const res=await fetch("/api/dashboard-data",{

    method:"POST",

    headers:{
      "Content-Type":"application/json"
    },

    body:JSON.stringify({email})

  });

  const data=await res.json();

  const container=document.getElementById("vehicleContainer");

  container.innerHTML="";

  data.vehicles.forEach(v=>{

    container.innerHTML+=`

    <div class="col-12 col-md-4 mb-4">

      <div class="card shadow-lg border-0 rounded-4 h-100">

        <div class="card-body">

          <h5 class="card-title">

            <i class="fas fa-car me-2"></i>

            ${v.carNumber || "Vehicle"}

          </h5>

          <p class="text-muted">

            Mobile: ${v.mobile || "-"}
          </p>

          <p class="text-muted">

            Owner: ${v.name || "-"}
          </p>

          <p class="text-muted">
            Scans: ${v.scanCount || 0}
          </p>

          <p class="text-muted">
            Last Scan: ${v.lastScanAt ? new Date(v.lastScanAt).toLocaleString() : "Never"}
          </p>

<div class="d-grid gap-2 mt-3">

<a href="/profile/${v.uniqueId}/view"
class="btn btn-sm btn-outline-primary w-100">
View
</a>

<!-- <button onclick="downloadQR('${v.uniqueId}')"
class="btn btn-sm btn-outline-success w-100">
Download QR
</button> -->

<a href="/profile/${v.uniqueId}/input?fromOtp=true"
class="btn btn-sm btn-outline-dark w-100">
Edit
</a>

<button onclick="deleteVehicle('${v.uniqueId}')"
class="btn btn-sm btn-outline-danger w-100">
Disable
</button>

</div>

        </div>

      </div>

    </div>

    `;

  });


  container.innerHTML+=`

  <div class="col-12 col-md-4 mb-4">

  <a href="/generate" style="text-decoration:none;">

  <div class="card shadow-sm border-dashed rounded-4 text-center p-5">

  <i class="fas fa-plus fa-2x mb-3"></i>

  <h5>Add Another Vehicle</h5>

  </div>

  </a>

  </div>

  `;

}


//function downloadQR(id){
//  window.open(`/profile/${id}/qr`, '_blank');
// }


async function deleteVehicle(id){

  if(!confirm("Delete this vehicle?")) return;

  const res=await fetch(`/api/delete-profile/${id}`,{
    method:"DELETE"
  });

  const data=await res.json();

  alert(data.message);

  loadDashboard();

}

function logout(){

  localStorage.removeItem("gonnetUserEmail");

  window.location.href="/";

}

async function deleteAccount(){

  const confirmed = confirm(
    "Are you sure you want to permanently delete your Gonnet account?\n\nAll linked profiles will be disabled immediately."
  );

  if(!confirmed) return;

  try{

    const email =
      localStorage.getItem("gonnetUserEmail");

    const res = await fetch(
      "/api/delete-account",
      {
        method:"DELETE",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({
          email
        })
      }
    );

    const data = await res.json();

    if(!res.ok){

      alert(data.error || "Deletion failed");

      return;

    }

    alert(
      "Your account deletion request has been initiated."
    );

    localStorage.removeItem(
      "gonnetUserEmail"
    );

    window.location.href = "/";

  }catch(err){

    console.log(err);

    alert("Deletion failed");

  }

}

loadDashboard();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
