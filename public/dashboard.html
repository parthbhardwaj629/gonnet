<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - Gonnet</title>

  <link rel="stylesheet" href="/style.css">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">

  <a class="navbar-brand gradient-text" href="/">Gonnet</a>

  <div class="text-white">

    <span id="userEmail"></span>

    <button onclick="logout()" class="btn btn-sm btn-outline-light ms-3">
      Logout
    </button>

  </div>

</nav>


<div class="container mt-5">

  <h2 class="mb-4">Welcome back 👋</h2>

  <div class="row" id="vehicleContainer"></div>

</div>


<script>

async function loadDashboard(){

  const email = localStorage.getItem("gonnetUserEmail");

  if(!email){
    window.location.href="/";
    return;
  }

  document.getElementById("userEmail").innerText=email;

  const res=await fetch("/api/dashboard-data",{

    method:"POST",

    headers:{
      "Content-Type":"application/json"
    },

    body:JSON.stringify({email})

  });

  const data=await res.json();

  const container=document.getElementById("vehicleContainer");

  container.innerHTML="";

  data.vehicles.forEach(v=>{

    container.innerHTML+=`

    <div class="col-md-4 mb-4">

      <div class="card shadow-lg border-0 rounded-4">

        <div class="card-body">

          <h5 class="card-title">

            <i class="fas fa-car me-2"></i>

            ${v.carNumber || "Vehicle"}

          </h5>

          <p class="text-muted">

            Mobile: ${v.mobile || "-"}
          </p>

          <p class="text-muted">

            Owner: ${v.name || "-"}
          </p>

<div class="d-flex justify-content-between mt-3">

<a href="/profile/${v.uniqueId}/view"
class="btn btn-sm btn-outline-primary">
View
</a>

<button onclick="downloadQR('${v.uniqueId}')"
class="btn btn-sm btn-outline-success">
QR
</button>

<a href="/profile/${v.uniqueId}/input?fromOtp=true"
class="btn btn-sm btn-outline-dark">
Edit
</a>

<button onclick="deleteVehicle('${v.uniqueId}')"
class="btn btn-sm btn-outline-danger">
Delete
</button>

</div>

        </div>

      </div>

    </div>

    `;

  });


  container.innerHTML+=`

  <div class="col-md-4 mb-4">

  <a href="/generate" style="text-decoration:none;">

  <div class="card shadow-sm border-dashed rounded-4 text-center p-5">

  <i class="fas fa-plus fa-2x mb-3"></i>

  <h5>Add Another Vehicle</h5>

  </div>

  </a>

  </div>

  `;

}


async function downloadQR(id){

  const res=await fetch(`/api/qr/${id}`);
  const data=await res.json();

  const link=document.createElement("a");
  link.href=data.qrImage;
  link.download="gonnet-qr.png";

  link.click();

}


async function deleteVehicle(id){

  if(!confirm("Delete this vehicle?")) return;

  const res=await fetch(`/api/delete-profile/${id}`,{
    method:"DELETE"
  });

  const data=await res.json();

  alert(data.message);

  loadDashboard();

}

function logout(){

  localStorage.removeItem("gonnetUserEmail");

  window.location.href="/";

}


loadDashboard();

</script>


</body>
</html>
