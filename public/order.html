<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Order Gonnet QR</title>

  <!-- SAME GLOBAL CSS -->
  <link rel="stylesheet" href="/style.css">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <!-- ORDER SPECIFIC -->
  <link href="/order.css" rel="stylesheet">

  <!-- Razorpay -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body>

  <!-- ✅ SAME NAVBAR -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="gradient-text" href="/">Gonnet</a>

      <div class="text-muted">
        <br>
        Scan to Know More. Connect Instantly.
      </div>

      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">

          <div class="text-center mt-3">
            <button class="btn">
              <li class="nav-item">
                <a class="nav-link" href="/#features">Features</a>
              </li>
            </button>
          </div>

          <div class="text-center mt-3">
            <button class="btn text-white">
              <li class="nav-item">
                <a class="nav-link" href="/order">Order QR</a>
              </li>
            </button>
          </div>

        </ul>
      </div>
    </div>
  </nav>

  <!-- ✅ ORDER CONTENT -->
  <div class="order-container">
    <div class="order-card">

      <h3 class="order-title">Order Your Gonnet QR</h3>

      <form id="orderForm">

        <input type="text" id="name" class="form-control mb-3" placeholder="Full Name" required>

        <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>

        <input 
  type="tel" 
  id="mobile" 
  class="form-control mb-3" 
  placeholder="Mobile Number" 
  required
>

        <input type="text" id="address" class="form-control mb-3" placeholder="Full Address" required>

        <div class="row">
          <div class="col-6">
            <input type="text" id="city" class="form-control mb-3" placeholder="City" required>
          </div>
          <div class="col-6">
            <input type="text" id="state" class="form-control mb-3" placeholder="State" required>
          </div>
        </div>

        <input type="text" id="pincode" class="form-control mb-3" placeholder="Pincode" required>

        <select id="quantity" class="form-control mb-3" onchange="updateTotal()">
          <option value="1">1 Sticker</option>
          <option value="2">2 Stickers</option>
          <option value="5">5 Stickers</option>
        </select>
        
        <div class="mt-3 text-center">
  <h5 id="totalDisplay">Total: ₹299</h5>
</div>

        <button type="button" onclick="placeOrder()" class="btn btn-warning w-100">
          Proceed to Payment
        </button>

      </form>

    </div>
  </div>

  <!-- ✅ SAME FOOTER + EXTRA LINE -->
  <footer class="brand-footer text-center">

    <p>Gonnet. All Rights Reserved.</p>

    <p style="font-size:14px;">
      For ordering stickers in bulk or customized stickers,<br>
      kindly contact <b>hello.gonnet@gmail.com</b>
    </p>

    

  </footer>

  <script>
    window.RAZORPAY_KEY_ID = "rzp_test_Sq1iCbgUsRrdTK"
  </script>

<script>

function validateForm(){

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const mobile = document.getElementById("mobile").value.trim();
  const address = document.getElementById("address").value.trim();
  const city = document.getElementById("city").value.trim();
  const state = document.getElementById("state").value.trim();
  const pincode = document.getElementById("pincode").value.trim();

  // EMPTY CHECK
  if(!name || !email || !mobile || !address || !city || !state || !pincode){
    alert("⚠️ Please fill all details before proceeding.");
    return false;
  }

  // EMAIL VALIDATION (proper regex)
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if(!emailRegex.test(email)){
    alert("⚠️ Please enter a valid email address.");
    return false;
  }

  if(!/^[6-9]\d{9}$/.test(mobile)){
  alert("⚠️ Enter valid 10-digit mobile number.");
  return false;
}

  // PINCODE VALIDATION (India - 6 digits)
  if(!/^[0-9]{6}$/.test(pincode)){
    alert("⚠️ Enter valid 6-digit pincode.");
    return false;
  }
  

  return true;
}

async function placeOrder(){

  if(!validateForm()) return;
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const mobile = document.getElementById("mobile").value;
  const address = document.getElementById("address").value;
  const city = document.getElementById("city").value;
  const state = document.getElementById("state").value;
  const pincode = document.getElementById("pincode").value;
  const quantity = parseInt(document.getElementById("quantity").value);

  const pricePerSticker = 249;
  const delivery = 50;
  const total = (pricePerSticker * quantity) + delivery;



try {

  const res = await fetch("/api/create-order", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ total })
  });

  const order = await res.json();

  console.log("ORDER =", order);

  if(!order.id){
    alert("Order creation failed");
    return;
  }

  const options = {
    key: window.RAZORPAY_KEY_ID,
    amount: order.amount,
    currency: "INR",
    order_id: order.id,
    name: "Gonnet",
    description: "QR Sticker Order",

    handler: async function (response){

      document.body.innerHTML = `
        <div style="text-align:center;padding:60px;">
          <h2>Processing order...</h2>
        </div>
      `;

      const saveRes = await fetch("/api/save-order", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          name,
          email,
          mobile,
          address,
          city,
          state,
          pincode,
          quantity,
          total,
          paymentId: response.razorpay_payment_id,
          orderId: response.razorpay_order_id,
          signature: response.razorpay_signature
        })
      });

      const saveData = await saveRes.json();

      if(saveData.success){
        alert("Payment Successful");
        window.location.href="/";
      } else {
        alert("Payment done but save failed");
      }
    },

    theme: {
      color: "#FFB300"
    }
  };

  const rzp1 = new Razorpay(options);

  rzp1.on("payment.failed", function (response) {
    console.log(response.error);
    alert("Payment Failed");
  });

  setTimeout(() => {
  rzp1.open();
}, 500);

} catch(err){

  console.log(err);
  alert("Checkout opening failed");

}


}

function updateTotal(){

  const quantity = parseInt(document.getElementById("quantity").value);

  const pricePerSticker = 249;
  const delivery = 50;

  const total = (pricePerSticker * quantity) + delivery;

  document.getElementById("totalDisplay").innerText = `Total: ₹${total}`;
}

updateTotal();
</script>

</body>
</html>
