<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Gonnet QR Card</title>

<link href="/style.css" rel="stylesheet">

<style>
*,
*::before,
*::after {
  box-sizing: border-box;
}

body {
  background: #f5f7fa;
  margin: 0;
  padding: 30px;
  font-family: 'Segoe UI', sans-serif;
}

/* ===== CARD ===== */
.qr-card {
  width: 380px;
  height: 230px;
  border-radius: 0px;
  display: flex;
  flex-direction: column;
  border: 1px solid #fff;
  margin: auto;
  overflow: hidden;
  background: linear-gradient(135deg, #1E88E5, #43A047);
}

.call-strip {
  width: 100%;
  min-height: 42px; /* 🔥 guaranteed mota */
  background: #e60000;
  color: #fff;

  display: flex;
  align-items: center;
  justify-content: center;

  font-family: Arial Black, Arial, sans-serif;
  font-weight: 900;
  font-size: 18px;

  letter-spacing: 2px;
  border-radius: 0;

  flex-shrink: 0; /* 🔥 MOST IMPORTANT */
}

/* CONTENT ROW */
.content-row {
  display: flex;
  flex: 1;
}

/* LEFT */
.qwerty {
  color: #fff;
  font-weight: 900;
  font-family: Arial Black, Arial, sans-serif;
  font-size: 18pt;
  letter-spacing: 1.5px;
}

.left {
  padding: 6mm;
  display: flex;
  flex-direction: column;
  justify-content: center;
  overflow: hidden;
}

.meta {
  font-size: 7pt;
  color: #fff;
  margin-top: 2mm;
}

.meta .powered {
  color: #FFB300;
  font-weight: 700;
}

.headline {
  margin-top: 4mm;
  font-size: 10pt;
  font-weight: 800;
  text-decoration: underline;
}

.note {
  margin-top: 2mm;
  font-size: 6.5pt;
  color: #fff;
}

/* RIGHT */
.right {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  padding: 3mm 4mm 3mm 8mm; /* 🔥 LEFT padding zyada */
}

/* QR BOX */
.qr-white {
  background: #fff;
  border-radius: 4mm;
  padding: 2mm; /* 🔥 reduced */
  margin-left: 3mm;
}

.qr-white img {
  width: 24mm;
  height: 24mm;
}

.qr-tagline {
  margin-top: 5px;
  font-size: 5.5pt;
  line-height: 1.2;
  color: #fff;
  text-align: center;
}

/* PRINT */
@media print {
  body {
    background: white;
    padding: 0;
  }
  .qr-card {
    margin: 0;
    page-break-inside: avoid;
  }
}
</style>
</head>

<body>

<div class="qr-card">

  <!-- 🔴 STRIP -->
  <div class="call-strip">SCAN & CALL OWNER</div>

  <!-- CONTENT -->
  <div class="content-row">

    <!-- LEFT -->
    <div class="left">
      <div class="qwerty">GONNET</div>

     <div class="meta" id="brandBlock">
        Gonnet. All Rights Reserved.<br> </div>
     <!--    <span class="powered">Powered by Ganga Motors
          <br><span style="color: #ffffff;">Gurgaon’s 1st Maruti Authorized Service Station</span>
          </span>
      </div> -->

      <div class="headline">
        Scan to know more.<br>
        Connect instantly
      </div>

      <div class="note">
        Scan using phone camera or QR scanner
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <div class="qr-white" id="qrBox">Loading…</div>

      <div class="qr-tagline">
        GONNET<br>
        Scan to know more.<br>
        Connect instantly
      </div>
    </div>

  </div>

</div>

<script>
async function loadQR() {

  const uniqueId = window.location.pathname.split("/")[2];

  const qrRes = await fetch(`/api/qr/${uniqueId}`);
  const qrData = await qrRes.json();

  if (qrData.qrImage) {
    document.getElementById("qrBox").innerHTML =
      `<img src="${qrData.qrImage}" alt="QR Code">`;
  }

  const profileRes = await fetch(`/api/profile/${uniqueId}`);
  const profile = await profileRes.json();

  const brand = profile.brandName || "Gonnet";

  if (brand !== "Gonnet") {
    document.getElementById("brandBlock").innerHTML = `
      Gonnet. All Rights Reserved.<br>
      <span class="powered">Powered by ${brand}</span>
    `;
  } else {
    document.getElementById("brandBlock").innerHTML = `
      Gonnet. All Rights Reserved.<br>
      <span class="powered">Powered by Ganga Motors</span>
    `;
  }

}
loadQR();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
